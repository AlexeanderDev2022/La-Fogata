<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Fogata - Lista de Pizzas</title>
    <th:block th:replace="~{layouts/plantillas :: cabecera}"></th:block>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <th:block th:replace="~{layouts/plantillas :: barraNavegacion}"></th:block>

    <h1 class="mb-4">Lista de Pizzas</h1>
    
    <a th:href="@{/pizzas/nuevo}" class="btn btn-primary mb-3">Crear Nueva Pizza</a>
    
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Pedidos</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="pizza : ${pizzas}">
                <td th:text="${pizza.id}">1</td>
                <td th:text="${pizza.nombre}">Margarita</td>
                <td th:text="${pizza.descripcion}">Pizza con tomate y queso</td>
                <td th:text="${#lists.size(pizza.pedidos)}">0</td>
                <td>
                    <a th:href="@{'/pizzas/' + ${pizza.id}}" class="btn btn-sm btn-info">Ver Detalle</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Bootstrap JS opcional -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
