<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:fragment="cabecera">
  <meta charset="UTF-8">
  <title>La Fogata</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <nav th:fragment="barraNavegacion" class="navbar navbar-expand-lg bg-white border-bottom fixed-top shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">La Fogata 🔥</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="/pizzas">Carta</a>
          </li>
        </ul>

        <form class="d-flex" role="search" onsubmit="buscar(event)">
          <div class="position-relative me-2">
            <input id="busqueda" class="form-control" type="search" placeholder="Buscar pizza..." aria-label="Buscar"
              oninput="toggleLimpiar()">
            <button type="button" id="btn-limpiar" onclick="limpiarBusqueda()"
              class="btn position-absolute top-50 end-0 translate-middle-y border-0"
              style="display: none; z-index: 10;">
              &times;
            </button>
          </div>
          <button class="btn btn-outline-success" type="submit">Buscar</button>
        </form>
        <script>
          // 1. Función para filtrar mientras escribes o das Enter
          function buscar(event) {
            if (event) event.preventDefault(); // Evita recargar página
            const filtro = document.getElementById('busqueda').value.toLowerCase();
            const items = document.querySelectorAll('.item-busqueda');

            items.forEach(item => {
              const texto = item.textContent.toLowerCase();
              item.style.display = texto.includes(filtro) ? '' : 'none';
            });
          }

          // 2. Función para mostrar/ocultar la "X"
          function toggleLimpiar() {
            const input = document.getElementById('busqueda');
            const btnLimpiar = document.getElementById('btn-limpiar');

            btnLimpiar.style.display = input.value.length > 0 ? 'block' : 'none';

            // Si borran manualmente todo el texto, reseteamos la tabla
            if (input.value.length === 0) {
              const items = document.querySelectorAll('.item-busqueda');
              items.forEach(item => item.style.display = '');
            } else {
              // Opcional: filtrar automáticamente mientras escriben
              buscar();
            }
          }

          // 3. Función para el botón "X"
          function limpiarBusqueda() {
            const input = document.getElementById('busqueda');
            input.value = '';

            // Ocultar la X
            document.getElementById('btn-limpiar').style.display = 'none';

            // Mostrar todos los items de la tabla
            const items = document.querySelectorAll('.item-busqueda');
            items.forEach(item => item.style.display = '');

            input.focus(); // Devolver el cursor al buscador
          }
        </script>
      </div>
    </div>
  </nav>

  <footer th:fragment="pie">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
  </footer>

</body>

</html>
