<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>La Fogata - Nuevo Pedido</title>
    <th:block th:replace="~{layouts/plantillas :: cabecera}"></th:block>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <th:block th:replace="~{layouts/plantillas :: barraNavegacion}"></th:block>

    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="card-title mb-4">Crear Nueva Pizza</h1>
            
            <form th:action="@{/pizzas/guardar}" th:object="${pizza}" method="post">
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre:</label>
                    <input type="text" id="nombre" th:field="*{nombre}" class="form-control" placeholder="Nombre de la pizza" required>
                </div>
                <div class="mb-3">
                    <label for="descripcion" class="form-label">Descripción:</label>
                    <textarea id="descripcion" th:field="*{descripcion}" class="form-control" rows="3" placeholder="Descripción de la pizza" required></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">Guardar Pizza</button>
            </form>

            <a th:href="@{/pizzas}" class="btn btn-link mt-3 d-block">Volver a la lista de pizzas</a>
        </div>
    </div>
</div>

<!-- Bootstrap JS (opcional, para componentes interactivos) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
