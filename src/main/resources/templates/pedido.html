<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <title>La Fogata - Nuevo Pedido</title>
    <th:block th:replace="~{layouts/plantillas :: cabecera}"></th:block>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="container">
        <th:block th:replace="~{layouts/plantillas :: barraNavegacion}"></th:block>

        <div class="row justify-content-center mt-5">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="card shadow-lg p-4">
                    <div class="text-center mb-4">
                        <h2 class="text-success fw-bold">🍕 La Fogata Pizzería</h2>
                        <p class="text-muted">Registro de nuevo pedido</p>
                    </div>

                    <!-- Formulario de pedido -->
                    <form th:object="${pedido}" th:action="@{/pedido/guardar}" method="post">
                        <input type="hidden" th:field="*{idPedido}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre del Cliente</label>
                            <input type="text" th:field="*{nombreCliente}" class="form-control"
                                placeholder="Ingrese nombre completo" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3 d-flex align-items-center">
                                <div class="form-check form-switch">
                                    <input th:field="*{esParaLlevar}" class="form-check-input" type="checkbox"
                                        id="esParaLlevar">
                                    <label class="form-check-label fw-semibold" for="esParaLlevar">¿Es para
                                        llevar?</label>
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Nro. Mesa</label>
                                <input type="number" th:field="*{nroMesa}" class="form-control" id="nroMesa" min="1"
                                    placeholder="Ej: 5">
                            </div>
                        </div>

                        <div class="row">
                            <!-- Tipo de Pizza -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Tipo de Pizza</label>
                                <select name="pizzaId" class="form-select" required>
                                    <option value="" selected disabled>Seleccione sabor...</option>
                                    <option th:each="p : ${Pizza}" th:value="${p.id}" th:text="${p.nombre}"
                                        th:selected="${pedido.pizza != null} ? ${p.id} == ${pedido.pizza.id} : false">
                                    </option>
                                </select>
                            </div>

                            <!-- Tamaño de pizza -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Tamaño</label>
                                <select th:field="*{tamano}" class="form-select" id="tamano" required>
                                    <option value="" disabled selected>Seleccione tamaño...</option>
                                    <option value="Pequeña" data-price="20.0">Pequeña</option>
                                    <option value="Mediana" data-price="35.0">Mediana</option>
                                    <option value="Grande" data-price="50.0">Grande</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <!-- Cantidad -->
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-semibold">Cantidad</label>
                                <input th:field="*{cantidad}" type="number" class="form-control" id="cantidad" min="1"
                                    value="1" required>
                            </div>

                            <!-- Precio unitario -->
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-semibold">Precio Unit.</label>
                                <div class="input-group">
                                    <span class="input-group-text">S/</span>
                                    <input type="number" step="0.01" class="form-control bg-light" id="precio" readonly>
                                </div>
                            </div>

                            <!-- Precio total -->
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-semibold text-success">Total a Pagar</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-success text-white border-success">S/</span>
                                    <input type="number" step="0.01" class="form-control border-success fw-bold"
                                        id="precioTotal" readonly>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-3">
                            <button type="submit" class="btn btn-success btn-lg shadow"
                                th:text="${pedido.idPedido != null} ? 'Actualizar Pedido 🍕' : 'Confirmar Pedido 🍕'">
                                Confirmar Pedido 🍕
                            </button>
                            <a th:href="@{/pedido}" class="btn btn-outline-secondary">Limpiar Formulario</a>
                        </div>

                    </form>
                </div>
            </div>

            <!-- Tabla de pedidos recientes -->
            <div class="container mt-5">
                <h3 class="text-center mb-4">Registro de Pedidos Recientes</h3>
                <div class="table-responsive shadow-sm rounded">
                    <table class="table table-hover align-middle border">
                        <thead class="table-danger">
                            <tr>
                                <th>Cliente</th>
                                <th>Mesa</th>
                                <th>Para Llevar</th>
                                <th>Tamaño</th>
                                <th>Tipo de Pizza</th>
                                <th class="text-center">Cant.</th>
                                <th>Precio Unit.</th>
                                <th>Precio Total</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-pizzas">
                            <tr th:each="p : ${pedidos}" class="item-busqueda">
                                <td th:text="${p.nombreCliente}"></td>
                                <td th:text="${p.esParaLlevar} ? '-' : ${p.nroMesa}"></td>
                                <td th:text="${p.esParaLlevar} ? 'Sí' : 'No'"></td>
                                <td th:text="${p.tamano}"></td>
                                <td th:text="${p.pizza.nombre}"></td>
                                <td class="text-center" th:text="${p.cantidad}"></td>
                                <td th:text="'S/ ' + (${p.tamano == 'Pequeña' ? 20 : p.tamano == 'Mediana' ? 35 : 50})">
                                </td>
                                <td
                                    th:text="'S/ ' + (${p.tamano == 'Pequeña' ? 20 : p.tamano == 'Mediana' ? 35 : 50} * ${p.cantidad})">
                                </td>
                                <td>
                                    <a th:href="@{'/pedido/editar/' + ${p.idPedido}}"
                                        class="btn btn-sm btn-primary">Editar</a>
                                    <a href="#" th:data-id="${p.idPedido}"
                                        class="btn btn-sm btn-danger btn-eliminar">Eliminar</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <p>Est es un reg de pedidos</p>
    </div>

    <!-- Scripts -->
    <script>
        const tamanoSelect = document.getElementById('tamano');
        const cantidadInput = document.getElementById('cantidad');
        const precioInput = document.getElementById('precio');
        const totalInput = document.getElementById('precioTotal');
        const switchLlevar = document.getElementById('esParaLlevar');
        const mesaInput = document.getElementById('nroMesa');

        function actualizarPrecios() {
            const selectedOption = tamanoSelect.options[tamanoSelect.selectedIndex];
            const precioUnitario = parseFloat(selectedOption.getAttribute('data-price')) || 0;
            const cantidad = parseInt(cantidadInput.value) || 1;

            precioInput.value = precioUnitario.toFixed(2);
            totalInput.value = (precioUnitario * cantidad).toFixed(2);
        }

        tamanoSelect.addEventListener('change', actualizarPrecios);
        cantidadInput.addEventListener('input', actualizarPrecios);

        switchLlevar.addEventListener('change', () => {
            if (switchLlevar.checked) {
                mesaInput.value = "";
                mesaInput.disabled = true;
                mesaInput.required = false;
            } else {
                mesaInput.disabled = false;
                mesaInput.required = true;
            }
        });

        window.onload = () => {
            actualizarPrecios();
        };

        // SweetAlert2 para eliminar pedidos
        document.querySelectorAll('.btn-eliminar').forEach(btn => {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                const idPedido = this.getAttribute('data-id');

                Swal.fire({
                    title: '¿Está seguro?',
                    text: "¡No podrás revertir esto!",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#3085d6',
                    cancelButtonColor: '#d33',
                    confirmButtonText: 'Sí, eliminar',
                    cancelButtonText: 'Cancelar'
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = '/pedido/eliminar/' + idPedido;
                    }
                });
            });
        });
    </script>
    <th:block th:replace="~{layouts/plantillas :: pie}"></th:block>
</body>

</html>
