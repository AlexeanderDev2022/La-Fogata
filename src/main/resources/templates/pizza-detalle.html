<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Pizza - La Fogata</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h1 th:text="${pizza.nombre}">Pizza Margarita</h1>
    <p th:text="${pizza.descripcion}">Descripción de la pizza...</p>

    <h3 class="mt-4">Pedidos de esta pizza</h3>
    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID Pedido</th>
                    <th>Cliente</th>
                    <th>Cantidad</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="pedido : ${pedidos}">
                    <td th:text="${pedido.id}">1</td>
                    <td th:text="${pedido.clienteNombre}">Juan Pérez</td>
                    <td th:text="${pedido.cantidad}">2</td>
                    <td th:text="${#dates.format(pedido.fecha, 'dd/MM/yyyy')}">27/02/2026</td>
                </tr>
                <tr th:if="${#lists.isEmpty(pedidos)}">
                    <td colspan="4" class="text-center">No hay pedidos para esta pizza.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <a th:href="@{/pizzas}" class="btn btn-link mt-3">Volver al menú</a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
